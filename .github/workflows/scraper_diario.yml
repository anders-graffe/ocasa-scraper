name: OCASA Scraper Diario

on:
  schedule:
    - cron: '0 12 * * *'   # todos los días 9 AM Argentina (UTC-3)
  workflow_dispatch:         # botón para correr manualmente cuando quieras

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Correr scraper
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: python scraper.py
