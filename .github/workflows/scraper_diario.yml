name: OCASA Scraper Diario

on:
  schedule:
    - cron: '40 22 * * *'   # 19:00 Argentina (UTC-3)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Keep repo active (evita suspensión de schedule)
        run: |
          git config user.email "scraper@ocasa.com"
          git config user.name "OCASA Scraper"
          echo "last_run=$(date -u +%Y-%m-%dT%H:%M:%SZ)" > last_run.txt
          git add last_run.txt
          git diff --staged --quiet || git commit -m "auto: last run $(date -u +%Y-%m-%d)"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: Correr scraper
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: python scraper.py
